name: Tap House style drift check

# Reusable workflow: a consumer repo calls this to verify its committed
# .clang-format / .clang-tidy / STYLE.md / .pre-commit-config.yaml match the
# canonical TapHouse copies at a pinned ref. Fails (with a diff) if any has
# drifted. scripts/tidy.sh is additionally guarded, but only where the consumer
# carries it (not every repo runs the clang-tidy gate).
on:
  workflow_call:
    inputs:
      ref:
        description: TapHouse ref (tag/branch/SHA) to check against.
        type: string
        default: main

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4

      - name: Checkout TapHouse canonical configs
        uses: actions/checkout@v4
        with:
          repository: tap/taphouse
          ref: ${{ inputs.ref }}
          path: .taphouse

      - name: Compare against canonical
        run: |
          fail=0
          for f in .clang-format .clang-tidy STYLE.md .pre-commit-config.yaml; do
            if ! diff -q ".taphouse/$f" "$f" >/dev/null 2>&1; then
              echo "::error file=$f::$f differs from TapHouse canonical (ref ${{ inputs.ref }}). Re-run taphouse/scripts/sync.sh and commit."
              diff -u ".taphouse/$f" "$f" || true
              fail=1
            fi
          done
          # scripts/tidy.sh is guarded only when the consumer carries it — repos
          # that do not run the clang-tidy gate are not required to ship it.
          if [ -f "scripts/tidy.sh" ]; then
            if ! diff -q ".taphouse/scripts/tidy.sh" "scripts/tidy.sh" >/dev/null 2>&1; then
              echo "::error file=scripts/tidy.sh::scripts/tidy.sh differs from TapHouse canonical (ref ${{ inputs.ref }}). Re-run taphouse/scripts/sync.sh and commit."
              diff -u ".taphouse/scripts/tidy.sh" "scripts/tidy.sh" || true
              fail=1
            fi
          fi
          # The Claude Code web SessionStart hook is guarded only when BOTH
          # sides carry it: older pinned TapHouse refs predate the hook, and
          # .claude/settings.json is deliberately unguarded (repos may extend
          # their settings with repo-specific hooks).
          if [ -f ".claude/hooks/session-start.sh" ] && [ -f ".taphouse/.claude/hooks/session-start.sh" ]; then
            if ! diff -q ".taphouse/.claude/hooks/session-start.sh" ".claude/hooks/session-start.sh" >/dev/null 2>&1; then
              echo "::error file=.claude/hooks/session-start.sh::session-start.sh differs from TapHouse canonical (ref ${{ inputs.ref }}). Re-run taphouse/scripts/sync.sh and commit."
              diff -u ".taphouse/.claude/hooks/session-start.sh" ".claude/hooks/session-start.sh" || true
              fail=1
            fi
          fi
          if [ "$fail" -eq 0 ]; then echo "All shared configs match TapHouse@${{ inputs.ref }}."; fi
          exit $fail
